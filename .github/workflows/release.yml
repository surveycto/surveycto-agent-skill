name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from SKILL.md
        id: version
        run: |
          VERSION=$(grep -A5 '^metadata:' SKILL.md | grep 'version:' | sed 's/.*version: *"\?\([^"]*\)"\?/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Build zip
        run: |
          zip -r surveycto-skill.zip . \
            -x '.git/*' \
            -x '.github/*' \
            -x '.gitignore' \
            -x 'README.md' \
            -x 'LICENSE' \
            -x '*.zip'

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: |
            SurveyCTO Agent Skill v${{ steps.version.outputs.version }}

            Download `surveycto-skill.zip` and upload it to your agent platform:
            - **Claude.ai / Cowork**: Settings > Features > Upload skill
            - **Claude Code**: Extract to `~/.claude/skills/surveycto/`
            - **Other tools**: Consult your tool's Agent Skills documentation
          files: surveycto-skill.zip
          make_latest: true
