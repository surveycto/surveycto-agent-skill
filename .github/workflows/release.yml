name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from SKILL.md
        id: version
        run: |
          VERSION=$(grep -A5 '^metadata:' SKILL.md | grep 'version:' | sed 's/.*version: *"\?\([^"]*\)"\?/\1/')
          if [ -z "$VERSION" ]; then
            echo "Failed to parse version from SKILL.md" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: v${{ steps.version.outputs.version }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists; will refresh asset only."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Release $TAG does not exist; will create."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build zip
        run: |
          zip -r surveycto-skill.zip SKILL.md references assets \
            -x '**/.DS_Store' -x '**/Thumbs.db' \
            -x '**/__pycache__/*' -x '**/*.pyc' -x '**/*.pyo'

      - name: Create release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: |
            SurveyCTO Agent Skill v${{ steps.version.outputs.version }}

            Download `surveycto-skill.zip` below and follow the install steps in the [README](https://github.com/surveycto/surveycto-agent-skill/blob/main/README.md) for your agent platform.
          append_body: true
          generate_release_notes: true
          files: surveycto-skill.zip
          make_latest: true

      - name: Refresh asset on existing release
        if: steps.check.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: v${{ steps.version.outputs.version }}
        run: |
          gh release upload "$TAG" surveycto-skill.zip \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
