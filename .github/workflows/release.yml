name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from SKILL.md
        id: version
        run: |
          VERSION=$(grep -A5 '^metadata:' SKILL.md | grep 'version:' | sed 's/.*version: *"\?\([^"]*\)"\?/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Build zip
        run: |
          zip -r surveycto-skill.zip . \
            -x '.git/*' \
            -x '.github/*' \
            -x '.gitignore' \
            -x 'README.md' \
            -x 'LICENSE' \
            -x '*.zip' \
            -x '.DS_Store' \
            -x 'Thumbs.db' \
            -x '**/.DS_Store' \
            -x '**/Thumbs.db' \
            -x '.kilo/*' \
            -x 'planning/*'

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: |
            SurveyCTO Agent Skill v${{ steps.version.outputs.version }}

            Download `surveycto-skill.zip` and install it in your agent platform:
            - **Claude Cowork**: sidebar > Customize > Create skill… > Upload a skill
            - **OpenAI Codex**: extract to `~/.agents/skills/surveycto/`
            - **Other Agent Skills-compatible tools**: extract into the host's skills directory (often `~/.<host>/skills/surveycto/`); see the README for details

            Pair the skill with the SurveyCTO MCP server at `https://assistant-be.surveycto.net/mcp` for purpose-built XLSForm tools and live knowledge-base search. Full per-host install steps are in the [README](https://github.com/surveycto/surveycto-agent-skill#installation).
          files: surveycto-skill.zip
          make_latest: true
